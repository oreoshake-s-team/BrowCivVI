name: CI cache
description: Restore and save the Yarn dependency, Prisma engine, and Next.js build caches.
runs:
  using: composite
  steps:
    - name: Cache Yarn dependencies
      uses: actions/cache@v4
      with:
        path: .yarn/cache
        key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-yarn-
    - name: Cache Prisma engine
      uses: actions/cache@v4
      with:
        path: ~/.cache/prisma
        key: ${{ runner.os }}-prisma-${{ hashFiles('yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-prisma-
    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: .next/cache
        key: ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-
