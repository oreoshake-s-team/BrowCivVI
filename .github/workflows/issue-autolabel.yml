name: Auto-label issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  autolabel:
    runs-on: ubuntu-latest
    steps:
      - name: Apply feature-space label from "Feature area"
        uses: actions/github-script@v7
        with:
          script: |
            const AREA_TO_LABEL = {
              'map': { name: 'map', color: '1d76db' },
              'combat': { name: 'combat', color: 'b60205' },
              'units / factions': { name: 'units', color: '5319e7' },
              'ai': { name: 'ai', color: '0e8a16' },
              'persistence': { name: 'persistence', color: 'c5def5' },
              'leaderboard': { name: 'leaderboard', color: 'fbca04' },
              'content / historical accuracy': { name: 'content', color: 'd4c5f9' },
              'educational media': { name: 'media', color: 'bfd4f2' },
              'ui / board': { name: 'ui', color: 'f9d0c4' },
              'engine': { name: 'engine', color: '006b75' },
              'infra / ci': { name: 'infra', color: 'cfd3d7' },
              'other': { name: 'other', color: 'ededed' },
            };

            const body = context.payload.issue.body || '';
            const match = body.match(/###\s*Feature area\s*\n+([^\n]+)/i);
            if (!match) {
              core.info('No "Feature area" section found; nothing to label.');
              return;
            }

            const area = match[1].trim().toLowerCase();
            const mapping = AREA_TO_LABEL[area];
            if (!mapping) {
              core.info(`Feature area "${area}" has no mapped label; skipping.`);
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            const existing = context.payload.issue.labels || [];
            if (existing.some((l) => (l.name || l) === mapping.name)) {
              core.info(`Label "${mapping.name}" already present; nothing to do.`);
              return;
            }

            try {
              await github.rest.issues.getLabel({ owner, repo, name: mapping.name });
            } catch (err) {
              if (err.status === 404) {
                core.info(`Creating missing label "${mapping.name}".`);
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: mapping.name,
                  color: mapping.color,
                });
              } else {
                throw err;
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [mapping.name],
            });
            core.info(`Applied label "${mapping.name}".`);